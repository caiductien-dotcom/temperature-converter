<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="converter-card">
    <h1>Temperature Converter</h1>
    <p>Enter the temperature, select units and submit</p>

    <div class="form-group">
        <input type="number" id="tempInput" placeholder="0.00">
        
        <select id="fromUnit">
            <option value="" disabled selected>From Unit</option>
            <option value="Celsius">Celsius</option>
            <option value="Fahrenheit">Fahrenheit</option>
            <option value="Kelvin">Kelvin</option>
        </select>

        <select id="toUnit">
            <option value="" disabled selected>To Unit</option>
            <option value="Celsius">Celsius</option>
            <option value="Fahrenheit">Fahrenheit</option>
            <option value="Kelvin">Kelvin</option>
        </select>

        <button id="convertBtn" disabled>Convert</button>
    </div>

    <div id="result" class="result-text"></div>
</div>
</body>
<script src="script.js"></script>
</html>
